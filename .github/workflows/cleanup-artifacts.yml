name: cleanup-artifacts

# Deletes old Actions artifacts so they stop eating the 500MB storage quota.
# Runs daily; also run it manually (Actions tab -> cleanup-artifacts -> Run
# workflow) to purge the existing backlog right now.
#
# Release installers are NOT touched — those live as GitHub Release assets,
# which are free and separate from Actions artifact storage.
on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      max_age_days:
        description: 'Delete artifacts older than this many days (0 = delete ALL)'
        required: false
        default: '2'

permissions:
  actions: write   # required to delete artifacts

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            // Scheduled runs use 2 days; manual runs use the provided input.
            const maxAgeDays = Number(context.payload.inputs?.max_age_days ?? '2');
            const cutoff = Date.now() - maxAgeDays * 24 * 60 * 60 * 1000;

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );

            let deleted = 0, freedBytes = 0;
            for (const a of artifacts) {
              if (new Date(a.created_at).getTime() < cutoff) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: a.id,
                });
                deleted++;
                freedBytes += a.size_in_bytes;
                core.info(`deleted "${a.name}" (${(a.size_in_bytes / 1e6).toFixed(1)} MB, created ${a.created_at})`);
              }
            }
            core.notice(`Deleted ${deleted} artifact(s), freed ${(freedBytes / 1e6).toFixed(1)} MB. Kept anything newer than ${maxAgeDays} day(s).`);
